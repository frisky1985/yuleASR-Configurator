name: Deploy yuleasr-web to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build web app with dependencies (skip api-server)
        run: pnpm --filter "yuleasr-web..." build
        env:
          PUBLIC_URL: ${{ steps.pages.outputs.base_path }}

      - name: Copy 404 page for SPA
        run: |
          cp apps/yuleasr-web/dist/index.html apps/yuleasr-web/dist/404.html

      - name: List build output
        run: |
          ls -la apps/yuleasr-web/dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/yuleasr-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
