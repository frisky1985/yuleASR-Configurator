name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Package VS Code extension
        run: |
          cd apps/yuleasr-vscode
          pnpm package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            apps/yuleasr-vscode/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-web:
    name: Publish Web App
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/tags/v*'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app with dependencies
        run: pnpm --filter "yuleasr-web..." build -- --base=/yuleASR-Configurator/

      - name: Prepare GH Pages dist
        run: cp apps/yuleasr-web/dist/index.html apps/yuleasr-web/dist/404.html

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/yuleasr-web/dist

  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: publish-web
    if: github.ref == 'refs/tags/v*'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/tags/v*'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VS Code extension
        run: pnpm --filter yuleasr-vscode build

      - name: Publish to VS Code Marketplace
        run: |
          cd apps/yuleasr-vscode
          pnpm publish-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
